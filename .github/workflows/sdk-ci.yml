name: SDK CI

on:
  push:
    branches: [master]
    paths:
      - 'sdk/**'
  pull_request:
    branches: [master]
    paths:
      - 'sdk/**'

defaults:
  run:
    working-directory: sdk

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK (editable)
        run: uv sync

      - name: Verify import
        run: uv run python -c "import agent_meeting; print('SDK import OK')"

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
